<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>関数ボックス</title>
  <style>
    :root {
      --bg: #f7f7f7;
      --panel: #ffffff;
      --shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
      --radius: 22px;
      --dark: #111;
      --text: #24324a;
      --sub: #666;
      --line: #e8ecf5;
      --line2: #d9e3f8;
      --accent: #8ea7f5;
      --accent-dark: #2d3b63;
      --success: #17813a;
      --danger: #c94747;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--dark);
    }

    .math-var {
      font-family: "Times New Roman", "STIX Two Math", Georgia, serif;
      font-style: italic;
      font-weight: 500;
      line-height: 1;
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 10px;
    }

    .panel {
      background: var(--panel);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 14px 12px 16px;
      border: 1px solid #eef1f8;
    }

    .title {
      margin: 0 0 12px;
      text-align: center;
      font-size: 24px;
      font-weight: 950;
      line-height: 1.2;
      color: var(--dark);
    }

    .number-pad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .digit-btn {
      border: 0;
      border-radius: 16px;
      background: #fff;
      color: #29374f;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
      min-height: 60px;
      font-size: 28px;
      font-weight: 950;
      cursor: pointer;
      transition: transform .08s ease, opacity .08s ease;
    }

    .digit-btn:active:not(:disabled) {
      transform: translateY(1px) scale(.99);
    }

    .digit-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .machine-wrap {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .machine {
      position: relative;
      width: min(100%, 310px);
      height: 216px;
      border-radius: 30px;
      background: linear-gradient(180deg, #fbfcff 0%, #f3f6ff 100%);
      border: 2px solid #d9e4ff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.85);
      overflow: hidden;
    }

    .machine::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 24px;
      border: 1px dashed #cdd8f3;
      pointer-events: none;
    }

    .machine.pulse {
      animation: machinePulse .42s ease;
    }

    @keyframes machinePulse {
      0% { transform: scale(1); }
      35% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .slot {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 22px;
      border-radius: 999px;
      background: linear-gradient(180deg, #42557f 0%, #1c2742 100%);
      box-shadow: inset 0 2px 3px rgba(255,255,255,.15);
      z-index: 3;
    }

    .slot.top {
      top: 22px;
    }

    .slot.bottom {
      bottom: 20px;
    }

    .screen {
      position: absolute;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      width: 194px;
      min-height: 74px;
      border-radius: 20px;
      background: #fffdf7;
      border: 2px solid #e9dbaf;
      box-shadow: 0 8px 18px rgba(120, 95, 20, 0.08);
      display: grid;
      place-items: center;
      padding: 10px 12px;
      text-align: center;
      z-index: 2;
    }

    .screen-hidden {
      width: 100%;
      height: 44px;
      border-radius: 14px;
      background: #fffdf7;
      border: 1px dashed #e3d6ae;
    }

    .screen-text {
      display: none;
      width: 100%;
    }

    .screen-text.show {
      display: block;
    }

    .screen-text strong {
      display: block;
      font-size: 28px;
      line-height: 1.15;
      color: #24324a;
      font-weight: 950;
    }

    .screen-text small {
      display: block;
      margin-top: 4px;
      color: #756640;
      font-size: 13px;
      font-weight: 800;
    }

    .machine-ui {
      position: absolute;
      left: 50%;
      top: 154px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2;
    }

    .light {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(180deg, #a9bbfb 0%, #7f98ef 100%);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.35);
    }

    .mini-monitor {
      width: 86px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(180deg, #dfe7fb 0%, #d3def7 100%);
      border: 1px solid #c4d2f4;
    }

    .mini-message {
      min-height: 22px;
      font-size: 15px;
      font-weight: 900;
      color: #33496f;
      text-align: center;
    }

    .mini-message.success {
      color: var(--success);
    }

    .mini-message.error {
      color: var(--danger);
    }

    .xy-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      color: #111;
      margin-top: 2px;
    }

    .xy-table th,
    .xy-table td {
      width: 10%;
      height: 42px;
      text-align: center;
      vertical-align: middle;
      font-size: clamp(14px, 4.4vw, 22px);
      font-weight: 800;
      padding: 0;
      border-left: 3px solid #111;
    }

    .xy-table tr > *:first-child {
      border-left: none;
    }

    .xy-table tr:nth-child(2) > * {
      border-top: 3px solid #111;
    }

    .xy-head {
      font-size: clamp(24px, 7vw, 34px) !important;
      font-weight: 500 !important;
    }

    .y-cell {
      color: #24324a;
    }

    .y-cell.empty {
      color: transparent;
    }

    .guess-area {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #eef1f8;
    }

    .guess-title {
      margin: 0 0 12px;
      font-size: 20px;
      line-height: 1.3;
      text-align: center;
      font-weight: 950;
      color: var(--dark);
    }

    .guess-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto 1fr;
      gap: 8px;
      align-items: center;
    }

    .eq-symbol {
      font-size: 26px;
      font-weight: 950;
      text-align: center;
      color: #24324a;
      min-width: 18px;
    }

    .eq-symbol.math-var {
      font-size: 32px;
      font-weight: 500;
      color: #111;
    }

    select,
    button.action,
    button.control {
      font: inherit;
    }

    select {
      width: 100%;
      height: 48px;
      padding: 0 10px;
      border-radius: 14px;
      border: 1px solid #dfe3eb;
      background: #fff;
      color: #111;
      font-size: 18px;
      font-weight: 900;
      outline: none;
    }

    .guess-preview {
      margin-top: 12px;
      padding: 14px 12px;
      border-radius: 16px;
      background: #fafbfe;
      border: 1px solid #e6ebf5;
      font-size: 24px;
      font-weight: 950;
      text-align: center;
      color: #24324a;
      line-height: 1.15;
      min-height: 58px;
      display: grid;
      place-items: center;
    }

    .expr {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      flex-wrap: nowrap;
      white-space: nowrap;
      gap: 0;
      max-width: 100%;
    }

    .expr .plain {
      font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
      font-style: normal;
      font-weight: 950;
      line-height: 1.05;
    }

    .expr .math-var {
      display: inline-block;
      line-height: 1;
      margin: 0;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-row.bottom {
      margin-top: 10px;
    }

    button.action,
    button.control {
      border: 0;
      border-radius: 14px;
      font-weight: 950;
      cursor: pointer;
      padding: 13px 12px;
      font-size: 17px;
      transition: transform .08s ease, opacity .08s ease;
    }

    button.action:active,
    button.control:active {
      transform: translateY(1px) scale(.99);
    }

    button.action.primary {
      background: #111;
      color: #fff;
    }

    button.action.secondary,
    button.control {
      background: #f1f1f1;
      color: #111;
    }

    .control.strong {
      background: #111;
      color: #fff;
    }

    .flying-card {
      position: fixed;
      width: 60px;
      height: 78px;
      border-radius: 16px;
      background: #fff;
      border: 2px solid #dbe3f5;
      color: #1f315b;
      display: grid;
      place-items: center;
      font-size: 32px;
      font-weight: 950;
      box-shadow: 0 16px 26px rgba(48, 74, 133, 0.18);
      z-index: 9999;
      pointer-events: none;
      transition:
        left 0.5s cubic-bezier(.22,.84,.24,1),
        top 0.5s cubic-bezier(.22,.84,.24,1),
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .flying-card.output {
      background: #f8fbff;
      border-color: #c8d6f6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1 class="title">関数ボックス</h1>

      <div id="numberPad" class="number-pad"></div>

      <div class="machine-wrap">
        <div id="machine" class="machine" aria-label="関数ボックス">
          <div id="topSlot" class="slot top"></div>

          <div class="screen">
            <div id="screenHidden" class="screen-hidden"></div>
            <div id="screenText" class="screen-text"></div>
          </div>

          <div class="machine-ui">
            <div class="light"></div>
            <div class="mini-monitor"></div>
            <div class="light"></div>
          </div>

          <div id="bottomSlot" class="slot bottom"></div>
        </div>

        <div id="message" class="mini-message">&nbsp;</div>

        <table class="xy-table" aria-label="xとyの表">
          <tr>
            <th class="xy-head"><span class="math-var">x</span></th>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
            <td>9</td>
          </tr>
          <tr>
            <th class="xy-head"><span class="math-var">y</span></th>
            <td id="y-cell-1" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-2" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-3" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-4" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-5" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-6" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-7" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-8" class="y-cell empty">&nbsp;</td>
            <td id="y-cell-9" class="y-cell empty">&nbsp;</td>
          </tr>
        </table>
      </div>

      <div class="guess-area">
        <h2 class="guess-title">この箱のルールを予想しよう</h2>

        <div class="guess-row">
          <select id="guessA" aria-label="a"></select>
          <div class="eq-symbol">×</div>
          <div class="eq-symbol math-var">x</div>
          <div class="eq-symbol">＋</div>
          <select id="guessB" aria-label="b"></select>
        </div>

        <div id="guessPreview" class="guess-preview"></div>

        <div class="btn-row">
          <button id="checkGuessBtn" class="action primary">これだ！</button>
          <button id="hintBtn" class="action secondary">ヒント</button>
        </div>

        <div class="btn-row bottom">
          <button id="revealBtn" class="control">答え</button>
          <button id="nextBtn" class="control strong">次へ</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      rule: null,
      triedMap: new Map(),
      locked: false,
      solved: false
    };

    const rulePool = [];

    const numberPad = document.getElementById('numberPad');
    const machine = document.getElementById('machine');
    const topSlot = document.getElementById('topSlot');
    const bottomSlot = document.getElementById('bottomSlot');
    const message = document.getElementById('message');
    const screenHidden = document.getElementById('screenHidden');
    const screenText = document.getElementById('screenText');

    const guessA = document.getElementById('guessA');
    const guessB = document.getElementById('guessB');
    const guessPreview = document.getElementById('guessPreview');
    const checkGuessBtn = document.getElementById('checkGuessBtn');
    const hintBtn = document.getElementById('hintBtn');
    const revealBtn = document.getElementById('revealBtn');
    const nextBtn = document.getElementById('nextBtn');

    function buildRulePool() {
      for (let a = 1; a <= 5; a++) {
        for (let b = 0; b <= 9; b++) {
          if (a === 1 && b === 0) continue;
          const maxY = a * 9 + b;
          if (maxY <= 50) {
            rulePool.push({ a, b });
          }
        }
      }
    }

    function fillGuessSelectors() {
      for (let a = 1; a <= 5; a++) {
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        guessA.appendChild(opt);
      }

      for (let b = 0; b <= 9; b++) {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = b;
        guessB.appendChild(opt);
      }

      guessA.value = "2";
      guessB.value = "1";
      updateGuessPreview();
    }

    function makeDigitButtons() {
      const digits = [1, 2, 3, 4, 5, 6, 7, 8, 9];

      digits.forEach(num => {
        const btn = document.createElement('button');
        btn.className = 'digit-btn';
        btn.textContent = num;
        btn.dataset.num = num;
        btn.addEventListener('click', () => handleDigit(num, btn));
        numberPad.appendChild(btn);
      });
    }

    function formatExpressionHtml(a, b, includeY = true) {
      const left = includeY
        ? `<span class="math-var">y</span><span class="plain"> = </span>`
        : '';

      const middle = a === 1
        ? `<span class="math-var">x</span>`
        : `<span class="plain">${a}</span><span class="math-var">x</span>`;

      const right = b === 0
        ? ''
        : `<span class="plain"> + ${b}</span>`;

      return `<span class="expr">${left}${middle}${right}</span>`;
    }

    function formatRuleText(a, b) {
      if (b === 0) return `${a}倍`;
      return `${a}倍して ${b}たす`;
    }

    function updateGuessPreview() {
      const a = Number(guessA.value);
      const b = Number(guessB.value);
      guessPreview.innerHTML = formatExpressionHtml(a, b, true);
    }

    function pickNewRule() {
      let picked;
      const currentKey = state.rule ? `${state.rule.a}-${state.rule.b}` : null;

      do {
        picked = rulePool[Math.floor(Math.random() * rulePool.length)];
      } while (rulePool.length > 1 && `${picked.a}-${picked.b}` === currentKey);

      return { ...picked };
    }

    function renderXYTable() {
      for (let x = 1; x <= 9; x++) {
        const cell = document.getElementById(`y-cell-${x}`);
        if (!cell) continue;

        if (state.triedMap.has(x)) {
          cell.textContent = state.triedMap.get(x);
          cell.classList.remove('empty');
        } else {
          cell.innerHTML = '&nbsp;';
          cell.classList.add('empty');
        }
      }
    }

    function setMessage(text, type = '') {
      message.className = 'mini-message';
      if (type) message.classList.add(type);
      message.textContent = text || ' ';
    }

    function computeY(x) {
      return state.rule.a * x + state.rule.b;
    }

    function revealRule() {
      screenHidden.style.display = 'none';
      screenText.classList.add('show');
      screenText.innerHTML = `
        <strong>${formatExpressionHtml(state.rule.a, state.rule.b, true)}</strong>
        <small>${formatRuleText(state.rule.a, state.rule.b)}</small>
      `;
    }

    function updateDigitButtons() {
      document.querySelectorAll('.digit-btn').forEach(btn => {
        btn.disabled = state.locked || state.solved;
      });
    }

    function resetRound() {
      state.rule = pickNewRule();
      state.triedMap = new Map();
      state.locked = false;
      state.solved = false;

      screenHidden.style.display = 'block';
      screenText.classList.remove('show');
      screenText.innerHTML = '';

      setMessage('', '');
      renderXYTable();
      updateDigitButtons();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function rectCenterRect(targetRect, width = 60, height = 78) {
      return {
        left: targetRect.left + targetRect.width / 2 - width / 2,
        top: targetRect.top + targetRect.height / 2 - height / 2
      };
    }

    function createFlyingCard(value, className = '') {
      const card = document.createElement('div');
      card.className = `flying-card ${className}`.trim();
      card.textContent = value;
      document.body.appendChild(card);
      return card;
    }

    function placeCard(card, rectObj) {
      card.style.left = rectObj.left + 'px';
      card.style.top = rectObj.top + 'px';
    }

    async function animateFlow(fromBtn, inputValue, outputValueNum) {
      machine.classList.add('pulse');
      setTimeout(() => machine.classList.remove('pulse'), 420);

      const fromRect = rectCenterRect(fromBtn.getBoundingClientRect());
      const slotRect = rectCenterRect(topSlot.getBoundingClientRect());
      const outStartRect = rectCenterRect(bottomSlot.getBoundingClientRect());
      const outEndRect = { ...outStartRect, top: outStartRect.top + 34 };

      const inputCard = createFlyingCard(inputValue, 'input');
      placeCard(inputCard, fromRect);

      await sleep(20);
      placeCard(inputCard, slotRect);

      await sleep(500);
      inputCard.style.transform = 'scale(0.35)';
      inputCard.style.opacity = '0';

      await sleep(150);
      inputCard.remove();

      const outCard = createFlyingCard(outputValueNum, 'output');
      placeCard(outCard, outStartRect);
      outCard.style.transform = 'scale(0.82)';
      outCard.style.opacity = '0';

      await sleep(20);
      outCard.style.transform = 'scale(1)';
      outCard.style.opacity = '1';
      placeCard(outCard, outEndRect);

      await sleep(520);
      outCard.style.opacity = '0';
      outCard.style.transform = 'scale(0.94)';

      await sleep(160);
      outCard.remove();
    }

    async function handleDigit(num, btnEl) {
      if (state.locked || state.solved) return;

      state.locked = true;
      updateDigitButtons();

      const y = computeY(num);

      try {
        await animateFlow(btnEl, num, y);
      } catch (e) {
        console.error(e);
      }

      state.triedMap.set(num, y);
      renderXYTable();
      setMessage('', '');

      state.locked = false;
      updateDigitButtons();
    }

    function checkGuess() {
      if (state.solved) return;

      const a = Number(guessA.value);
      const b = Number(guessB.value);

      if (a === state.rule.a && b === state.rule.b) {
        state.solved = true;
        revealRule();
        setMessage('正解！', 'success');
        updateDigitButtons();
        return;
      }

      setMessage('ちがう', 'error');
    }

    function showHint() {
      if (state.solved) {
        setMessage('正解済み', 'success');
        return;
      }

      const tried = Array.from(state.triedMap.entries())
        .map(([x, y]) => ({ x, y }))
        .sort((a, b) => a.x - b.x);

      for (let i = 1; i < tried.length; i++) {
        const dx = tried[i].x - tried[i - 1].x;
        const dy = tried[i].y - tried[i - 1].y;
        if (dx === 1) {
          setMessage(`1ふえると ${dy}ふえる`, '');
          return;
        }
      }

      setMessage('ならんだ数で見る', '');
    }

    function revealAnswer() {
      if (state.solved) return;
      state.solved = true;
      revealRule();
      setMessage(formatRuleText(state.rule.a, state.rule.b), 'success');
      updateDigitButtons();
    }

    function setupEvents() {
      guessA.addEventListener('change', updateGuessPreview);
      guessB.addEventListener('change', updateGuessPreview);
      checkGuessBtn.addEventListener('click', checkGuess);
      hintBtn.addEventListener('click', showHint);
      revealBtn.addEventListener('click', revealAnswer);
      nextBtn.addEventListener('click', resetRound);

      window.addEventListener('keydown', (e) => {
        if (state.locked || state.solved) return;
        if (e.key >= '1' && e.key <= '9') {
          const btn = document.querySelector(`.digit-btn[data-num="${e.key}"]`);
          if (btn) handleDigit(Number(e.key), btn);
        }
      });
    }

    buildRulePool();
    fillGuessSelectors();
    makeDigitButtons();
    setupEvents();
    resetRound();
  </script>
</body>
</html>
